name: Deploy

# Builds the Docusaurus site and publishes it to GitHub Pages.
# Custom domain handling: peaceiris/actions-gh-pages writes the CNAME
# file (luau2ts.com) on every deploy so the apex domain stays bound.
# Apex-domain DNS: A records to GitHub's IPs 185.199.108.153,
# .109.153, .110.153, .111.153 (plus optional AAAA records for IPv6).

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'   # daily rebuild so the playground picks up new luau2ts releases
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out luau2ts.com
        uses: actions/checkout@v6
        with:
          path: luau2ts.com

      # The playground page imports `luau2ts` via `link:../luau2ts`, so
      # the compiler repo has to live as a sibling on disk before
      # `pnpm install` resolves. Once luau2ts ships to npm we can drop
      # this checkout and replace the link: with a registry version.
      - name: Check out luau2ts (compiler)
        uses: actions/checkout@v6
        with:
          repository: luau2ts/luau2ts
          path: luau2ts

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: luau2ts.com/pnpm-lock.yaml

      - name: Build the linked luau2ts compiler
        working-directory: luau2ts
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Install and build the site
        working-directory: luau2ts.com
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./luau2ts.com/build
          publish_branch: gh-pages
          cname: luau2ts.com
