name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm prettier

      - run: pnpm eslint

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out luau2ts.com
        uses: actions/checkout@v6
        with:
          path: luau2ts.com

      - name: Check out luau2ts (compiler)
        uses: actions/checkout@v6
        with:
          repository: luau2ts/luau2ts
          path: luau2ts

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: luau2ts.com/pnpm-lock.yaml

      - name: Build the linked luau2ts compiler
        working-directory: luau2ts
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build the site
        working-directory: luau2ts.com
        run: |
          pnpm install --frozen-lockfile
          pnpm build
